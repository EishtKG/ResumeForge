<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResumeForge — AI Resume Tailor & Portfolio Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="app-shell">
    <!-- INPUT PANEL -->
    <aside class="input-panel" id="inputPanel">
      <div class="panel-header">
        <div class="logo-row">
          <span class="logo-mark">RF</span>
          <span class="logo-text">ResumeForge</span>
        </div>
        <button class="btn-theme-toggle" id="darkModeToggle" title="Toggle dark mode">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

      <div class="panel-body">
        <div class="settings-row">
          <div class="input-group">
            <label class="input-label">Theme</label>
            <div class="theme-picker" id="themePicker">
              <button class="theme-btn active" data-theme="minimal">Minimal</button>
              <button class="theme-btn" data-theme="editorial">Editorial</button>
              <button class="theme-btn" data-theme="bold">Bold</button>
            </div>
          </div>
          <div class="input-group">
            <label class="input-label">Accent</label>
            <div class="color-picker-row">
              <input type="color" id="accentColor" value="#171717" class="color-input">
            </div>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="resumeInput">Resume</label>
          <textarea
            id="resumeInput"
            class="input-textarea"
            placeholder="Paste your raw resume text here..."
            rows="10"
          ></textarea>
        </div>

        <div class="input-group">
          <label class="input-label" for="jobInput">Job Description</label>
          <textarea
            id="jobInput"
            class="input-textarea"
            placeholder="Paste the target job description..."
            rows="10"
          ></textarea>
        </div>
      </div>

      <div class="panel-footer">
        <button class="btn-generate" id="generateBtn">
          <span class="btn-text">Generate</span>
          <span class="btn-loading" id="btnLoading">
            <span class="spinner"></span>
            <span id="loadingStep">Preparing...</span>
          </span>
        </button>
        <div class="progress-steps" id="progressSteps">
          <div class="step" data-step="parse">Parsing resume</div>
          <div class="step" data-step="match">Matching keywords</div>
          <div class="step" data-step="cover">Writing cover letter</div>
          <div class="step" data-step="portfolio">Building portfolio</div>
        </div>
      </div>
    </aside>

    <!-- PREVIEW PANEL -->
    <main class="preview-panel" id="previewPanel">
      <div class="preview-toolbar" id="previewToolbar" style="display:none;">
        <div class="tab-bar">
          <button class="tab active" data-tab="portfolio">Portfolio</button>
          <button class="tab" data-tab="cover-letter">Cover Letter</button>
          <button class="tab" data-tab="ats-resume">ATS Resume</button>
        </div>
        <div class="toolbar-actions" id="toolbarActions">
          <button class="btn-export btn-export-secondary" id="exportHtml">Export HTML</button>
          <button class="btn-export" id="exportPdf">Export PDF</button>
        </div>
      </div>

      <div class="preview-content" id="previewContent">
        <div class="empty-state" id="emptyState">
          <div class="empty-mesh"></div>
          <div class="empty-content">
            <div class="empty-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <h2 class="empty-title">Your portfolio starts here</h2>
            <p class="empty-desc">Paste your resume and a job description, then hit Generate to create a tailored, single-page portfolio.</p>
            <div class="empty-shortcut">
              <kbd>Ctrl</kbd> + <kbd>Enter</kbd>
            </div>
          </div>
        </div>

        <div class="tab-content active" id="portfolioTab"></div>
        <div class="tab-content" id="coverLetterTab"></div>
        <div class="tab-content" id="atsResumeTab"></div>
      </div>
    </main>
  </div>

  <script type="module" src="/scripts/app.js"></script>
</body>
</html>
